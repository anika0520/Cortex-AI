services:
  - type: web
    name: cortex-backend
    env: python
    rootDir: cortex-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: EXPECTED_EMAIL
        sync: false
      - key: MY_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
